<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Mulish:wght@700&family=Open+Sans:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
  <title>{% block title %}WhereTheyStand{% endblock %}</title>
</head>
<body style="margin:0;padding:0;background-color:#f4f4f4;">
  {# theme1 matches wheretheystand-client/assets/css/main.css --color-theme1 #}
  <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="background-color:#f4f4f4;padding:24px 16px;">
    <tr>
      <td align="center">
        <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="max-width:560px;background:#ffffff;border-radius:8px;">
          <tr>
            <td style="padding:32px;font-family:'Open Sans',Helvetica,Arial,sans-serif;font-size:16px;line-height:1.6;color:#333333;">
              {% block body %}{% endblock %}
            </td>
          </tr>
          <tr>
            <td style="padding:32px 32px 32px;border-top:1px solid #eeeeee;text-align:center;">
              <span style="font-family:'Mulish',Helvetica,Arial,sans-serif;font-weight:700;font-size:18px;color:#349494;">WhereTheyStand</span>
            </td>
          </tr>
          <tr>
            <td style="padding:16px 32px 16px;text-align:center;">
              <span style="font-family:'Open Sans',Helvetica,Arial,sans-serif;font-size:12px;color:#666666;">You are recieving this email because you are a system administrator of WhereTheyStand.</span>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
